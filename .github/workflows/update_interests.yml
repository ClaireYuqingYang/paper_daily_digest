name: Update Interests & Run Digest

# 每次你在 GitHub 网页上修改 interests.txt 并 commit，自动重新跑一次推送
on:
  push:
    paths:
      - "interests.txt"

  # 也可以手动触发，并直接在网页上输入新的兴趣关键词
  workflow_dispatch:
    inputs:
      interests:
        description: |
          新的研究兴趣（每行一个关键词，直接覆盖 interests.txt）
          例如：causal inference
               platform economy
               consumer behavior
        required: false

jobs:
  update-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Update interests.txt (if provided via workflow_dispatch)
        if: github.event.inputs.interests != ''
        run: |
          echo "# 研究兴趣（由 GitHub Actions 更新）" > interests.txt
          echo "${{ github.event.inputs.interests }}" >> interests.txt
          echo "✅ interests.txt updated:"
          cat interests.txt

      - name: Run digest with updated interests
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          SERVERCHAN_KEY:          ${{ secrets.SERVERCHAN_KEY }}
          TELEGRAPH_ACCESS_TOKEN:  ${{ secrets.TELEGRAPH_ACCESS_TOKEN }}
        run: python main.py --days 30
